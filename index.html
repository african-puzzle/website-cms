<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — African Puzzle</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="icon" href="/favicon.ico" sizes="48x48" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Brand fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Montserrat:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    /* African Puzzle brand theming for Sveltia CMS */
    :root {
      /* Primary accent — brand purple */
      --sui-primary-accent-color-light: #f3e8ff;
      --sui-primary-accent-color: #8C30F5;
      --sui-primary-accent-color-dark: #6b21a8;
      --sui-primary-accent-color-inverted: #ffffff;

      /* Typography */
      --sui-primary-font-family: 'Montserrat', system-ui, sans-serif;
      --sui-primary-heading-font-family: 'Nunito', system-ui, sans-serif;

      /* Secondary accent — brand teal (used sparingly for visual variety) */
      --sui-secondary-accent-color: #1a7a6d;
    }

    /* Sidebar brand styling */
    [class*="sidebar"], [class*="nav-bar"], nav[role="navigation"] {
      font-family: 'Montserrat', system-ui, sans-serif;
    }

    /* Login / auth screen */
    [class*="login"], [class*="auth"] {
      font-family: 'Montserrat', system-ui, sans-serif;
    }

    /* Subtle top bar accent line */
    header::after {
      content: '';
      display: block;
      height: 2px;
      background: linear-gradient(90deg, #8C30F5, #1a7a6d);
    }

    /* Collection list item hover — subtle purple tint */
    [class*="list-item"]:hover {
      background-color: #f3e8ff;
    }

    /* Save/publish button — brand purple */
    button[class*="publish"], button[class*="save"] {
      background-color: #8C30F5 !important;
      border-color: #8C30F5 !important;
    }
    button[class*="publish"]:hover, button[class*="save"]:hover {
      background-color: #6b21a8 !important;
      border-color: #6b21a8 !important;
    }

    /* ── Typographic scale ─────────────────────────────────
       Base:     1rem    (16px) — body, list items, sidebar
       Labels:   0.875rem (14px) — uppercase field labels
       Headings: 1.25rem  (20px) — section headings
       Titles:   1.5rem   (24px) — page titles
       ───────────────────────────────────────────────────── */
    html {
      font-size: 16px;
    }
    body {
      font-size: 1rem;
      line-height: 1.5;
    }

    /* Sidebar text — enforce 16px minimum */
    [class*="sidebar"] a,
    [class*="sidebar"] span,
    [class*="sidebar"] li,
    [class*="nav-bar"] a,
    [class*="nav-bar"] span,
    nav[role="navigation"] a,
    nav[role="navigation"] span {
      font-size: 1rem !important;
    }

    /* Content list items — enforce 16px minimum */
    [class*="list-item"],
    [class*="list-item"] span,
    [class*="list-item"] a,
    [class*="entry-listing"],
    [class*="entry-listing"] span,
    [class*="entry-listing"] a {
      font-size: 1rem !important;
    }

    /* Section headings */
    [class*="pane-header"] h2,
    [class*="pane-header"] h3,
    [class*="toolbar"] h2,
    [class*="toolbar"] h3,
    [class*="collection-header"],
    [class*="section-heading"] {
      font-size: 1.25rem !important;
    }

    /* Page titles */
    [class*="pane-header"] h1,
    [class*="toolbar"] h1,
    [class*="page-title"] {
      font-size: 1.5rem !important;
    }

    /* Global minimum font-size safety net for CMS container */
    [id="nc-root"] *,
    [class*="cms-container"] * {
      font-size: max(var(--_fs, 0.875rem), 0.875rem);
    }

    /* Tighter form spacing */
    [class*="field-wrapper"],
    [class*="field-group"] {
      margin-bottom: 0.75rem !important;
    }

    /* Field label styling — uppercase, weighted, 14px (visually ~16px with caps + tracking) */
    label[class*="field-label"],
    [class*="field-wrapper"] > label {
      text-transform: uppercase;
      font-size: 0.875rem !important;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #4a4a4a;
    }

    /* Active sidebar collection item highlight */
    [class*="sidebar"] [class*="active"],
    nav[role="navigation"] [aria-current="true"] {
      border-left: 3px solid #8C30F5;
      background-color: #f3e8ff;
    }

    /* Hide preview pane — full-width editor */
    [class*="preview-pane"],
    [class*="editor-preview"] {
      display: none !important;
    }
    [class*="editor-pane"],
    [class*="control-pane"] {
      width: 100% !important;
      max-width: 100% !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>
</body>
</html>
