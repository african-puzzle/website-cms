logo_url: https://africanpuzzle.com/images/logo-bright.svg

backend:
  name: github
  repo: african-puzzle/website-frontend
  branch: main
  base_url: https://sveltia-cms-auth.proverb-drinker9c.workers.dev

site_url: https://africanpuzzle.com
display_url: https://africanpuzzle.com

media_folder: public/images
public_folder: /images

collections:
  - name: team
    label: Team Members
    folder: src/content/team
    create: true
    extension: md
    format: yaml-frontmatter
    sortable_fields: ['order', 'name']
    fields:
      - { label: Name, name: name, widget: string }
      - label: Role
        name: role
        widget: object
        fields:
          - { label: French, name: fr, widget: string }
          - { label: English, name: en, widget: string }
          - { label: Pidgin, name: pcm, widget: string }
      - { label: LinkedIn URL, name: linkedin, widget: string, required: false, default: '' }
      - { label: Photo, name: photo, widget: image, required: false, default: '' }
      - { label: Display Order, name: order, widget: number, value_type: int }

  - name: media
    label: Media Coverage
    folder: src/content/media
    create: true
    extension: md
    format: yaml-frontmatter
    sortable_fields: ['date', 'title']
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false, default: '' }
      - { label: Date, name: date, widget: datetime, format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false }
      - label: Category
        name: category
        widget: select
        options:
          - { label: 'Radio & Podcasts', value: radio }
          - { label: 'Press Release', value: press-release }
          - { label: 'Articles', value: articles }
          - { label: 'Videos', value: videos }
          - { label: 'Social Mention', value: social }
      - { label: Image, name: image, widget: image }
      - { label: Link, name: link, widget: string }

  - name: features
    label: Features
    folder: src/content/features
    create: true
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: 'Title i18n Key', name: titleKey, widget: string }
      - { label: 'Description i18n Key', name: descKey, widget: string }
      - { label: GIF, name: gif, widget: image }
      - { label: 'Card Background Class', name: cardBg, widget: string }
      - { label: Display Order, name: order, widget: number, value_type: int }

  - name: countries
    label: Countries
    files:
      - name: countries
        label: Countries List
        file: src/content/countries/countries.json
        fields:
          - label: Countries
            name: body
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Emoji Flag, name: emoji, widget: string }
              - { label: French Name, name: fr, widget: string }
              - { label: English Name, name: en, widget: string }
              - { label: Pidgin Name, name: pcm, widget: string }

  - name: site-settings
    label: Site Settings
    files:
      - name: site
        label: General Settings
        file: src/content/settings/site.json
        fields:
          - label: Settings
            name: body
            widget: list
            max: 1
            fields:
              - { label: ID, name: id, widget: hidden, default: 'site' }
              - { label: Play Store URL, name: playStoreUrl, widget: string }
              - { label: YouTube Video ID, name: youtubeVideoId, widget: string }
              - { label: Contact Email, name: contactEmail, widget: string }
              - { label: Contact Phone, name: contactPhone, widget: string }
              - { label: Instagram Handle, name: instagramHandle, widget: string }
              - { label: Instagram URL, name: instagramUrl, widget: string }

      - name: social-links
        label: Social Links
        file: src/content/settings/social-links.json
        fields:
          - label: Links
            name: body
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - label: Platform
                name: platform
                widget: select
                options: ['WhatsApp', 'Facebook', 'Instagram', 'Telegram', 'Twitter', 'LinkedIn', 'YouTube']
              - { label: URL, name: url, widget: string }
              - { label: 'Handle / Display Value', name: handle, widget: string, required: false, default: '' }
              - { label: Show in Footer, name: showInFooter, widget: boolean, default: false }
              - { label: Show in Contact Page, name: showInContact, widget: boolean, default: false }
              - { label: Display Order, name: order, widget: number, value_type: int }

      - name: instagram
        label: Instagram Feed
        file: src/content/settings/instagram.json
        fields:
          - label: Posts
            name: body
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Image, name: image, widget: image }
              - { label: Instagram Link, name: link, widget: string }
              - { label: Display Order, name: order, widget: number, value_type: int }

  - name: privacy
    label: Privacy Policy
    folder: src/content/privacy
    create: true
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Effective Date, name: effectiveDate, widget: string }
      - label: Locale
        name: locale
        widget: select
        options:
          - { label: French, value: fr }
          - { label: English, value: en }
          - { label: Pidgin, value: pcm }
      - { label: Content, name: body, widget: markdown }

